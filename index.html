<style>
  :root{
    --bg:#FAF7F0; --panel:#FFFFFF; --ink:#26241E; --ink-soft:#6B6858;
    --line:#E5E1D4; --accent:#146C64; --accent-ink:#0B3A36; --accent-bg:#DCEFEC;
    --warn:#B8860B;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;}
  h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;margin:0;}
  .wrap{max-width:960px;margin:0 auto;padding:32px 20px 80px;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;}
  header{margin-bottom:28px;}
  header h1{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:600;font-size:36px;letter-spacing:.01em;margin-top:6px;}
  header p{color:var(--ink-soft);font-size:14px;margin-top:6px;}
  .search-row{display:flex;gap:8px;margin-top:20px;}
  input[type=text]{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:14px;color:var(--ink);}
  input[type=text]:focus{outline:2px solid var(--accent);outline-offset:1px;}
  button{font:inherit;cursor:pointer;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:10px 16px;font-size:13px;transition:background .15s;}
  button:hover{background:var(--accent-bg);}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  button.primary:hover{background:var(--accent-ink);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
  .chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);font-size:13px;background:var(--panel);cursor:pointer;user-select:none;}
  .chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-ink);}
  .flag{font-size:15px;line-height:1;display:inline-block;vertical-align:middle;}
  select{padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:13px;background:var(--panel);color:var(--ink);}
  .country-add{position:relative;margin-top:10px;max-width:260px;}
  #countrySearchInput{width:100%;padding:8px 12px;border-radius:999px;border:1px solid var(--line);font-size:13px;background:var(--panel);color:var(--ink);}
  .country-results{position:absolute;top:calc(100% + 4px);left:0;right:0;max-height:260px;overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.08);z-index:10;display:none;}
  .country-result-item{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .country-result-item:hover{background:var(--accent-bg);}
  .country-result-empty{padding:10px 12px;font-size:12.5px;color:var(--ink-soft);}
  .tone-panel{margin-top:24px;padding:18px 20px;border-radius:12px;background:var(--panel);border:1px solid var(--line);}
  .tone-panel .head{display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .tone-panel .head h3{font-size:16px;}
  .tone-body{margin-top:10px;font-size:13px;line-height:1.7;color:var(--ink-soft);white-space:pre-wrap;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-top:24px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;}
  .card .meta{display:flex;align-items:center;gap:6px;}
  .logo{width:20px;height:20px;border-radius:5px;background:var(--accent-bg);color:var(--accent-ink);font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
  .source{font-size:11px;color:var(--ink-soft);}
  .stance{margin-left:auto;font-size:10px;padding:2px 8px;border-radius:999px;font-family:'JetBrains Mono',monospace;}
  .stance.pro{background:#E3F1DE;color:#2F5C1F;}
  .stance.con{background:#F6E1DE;color:#8A3324;}
  .stance.neu{background:#EFEDE4;color:#6B6858;}
  .card .title{font-size:14px;font-weight:600;line-height:1.4;}
  .card .snippet{font-size:12.5px;color:var(--ink-soft);line-height:1.55;}
  .card .actions{display:flex;gap:6px;margin-top:2px;}
  .card .actions button{flex:1;font-size:12px;padding:7px 6px;display:flex;align-items:center;justify-content:center;gap:4px;}
  .card .actions button.icon-only{flex:none;width:32px;}
  .ai-result{font-size:12.5px;line-height:1.6;background:var(--accent-bg);color:var(--accent-ink);border-radius:8px;padding:10px;white-space:pre-wrap;}
  .loading{font-size:12px;color:var(--ink-soft);font-style:italic;}
  .roadmap{margin-top:36px;padding-top:20px;border-top:1px solid var(--line);}
  .roadmap h3{font-size:15px;margin-bottom:10px;}
  .roadmap ul{margin:0;padding-left:18px;font-size:13px;color:var(--ink-soft);line-height:1.9;}
  .diversity{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .acronym-badges{display:flex;gap:4px;margin-bottom:10px;}
  .acronym-badges span{width:26px;height:26px;border-radius:6px;background:var(--accent-bg);color:var(--accent-ink);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .eyebrow strong{color:var(--accent-ink);font-weight:700;}
  .toolbar{display:flex;gap:8px;align-items:center;margin-top:12px;}
  #bookmarkToggleBtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .bookmark-btn{font-size:18px;background:none;border:none;padding:4px 6px;cursor:pointer;color:var(--ink-soft);line-height:1;}

function gdeltSlug(code){
  if (GDELT_SLUG_OVERRIDE[code]) return GDELT_SLUG_OVERRIDE[code];
  return GDELT_NAME[code].toLowerCase().replace(/[^a-z]/g, '');
}

function flagImg(code){
  // Builds the flag emoji from the two-letter country code (no network request needed)

  return `<span class="flag" role="img" aria-label="${COUNTRIES[code].name} 국기">${emoji}</span>`;
}

// ---------- rendering ----------
function renderChips(){
  const row = document.getElementById('chipRow');
  row.innerHTML = '';
  [...selectedCountries].forEach(code=>{
    const c = COUNTRIES[code];
    const chip = document.createElement('div');
    chip.className = 'chip active';
    chip.title = '클릭하면 목록에서 뺄 수 있어요';
    chip.innerHTML = `${flagImg(code)}${c.name} <span style="opacity:.55;">×</span>`;
    chip.onclick = () => { toggleCountry(code); };
    row.appendChild(chip);
  });
}

function sortedRemainingCountries(){
  return Object.keys(COUNTRIES)
    .filter(code => !selectedCountries.has(code))
    .sort((a,b) => COUNTRIES[a].name.localeCompare(COUNTRIES[b].name, 'ko'));
}

function filterCountryResults(query){
  const box = document.getElementById('countryResults');
  const q = query.trim();
  const pool = sortedRemainingCountries();
  const filtered = q ? pool.filter(code => COUNTRIES[code].name.includes(q)) : pool;
  box.style.display = 'block';
  box.innerHTML = filtered.length
    ? filtered.map(code => `<div class="country-result-item" onmousedown="pickCountry('${code}')">${flagImg(code)}${COUNTRIES[code].name}</div>`).join('')
    : `<div class="country-result-empty">검색 결과가 없어요</div>`;
}

function hideCountryResults(){
  document.getElementById('countryResults').style.display = 'none';
}

function pickCountry(code){
  selectedCountries.add(code);
  const input = document.getElementById('countrySearchInput');
  input.value = '';
  hideCountryResults();
  renderChips();
  renderResults();
}

// ---------- bookmarks (persisted via artifact storage) ----------
let bookmarks = {}; // id -> article object
let showingBookmarks = false;

async function loadBookmarks(){
  try{
    if (window.storage){
      const res = await window.storage.get('geumma-bookmarks', false);
      bookmarks = res ? JSON.parse(res.value) : {};
    } else {
      const raw = localStorage.getItem('geumma-bookmarks');
      bookmarks = raw ? JSON.parse(raw) : {};
    }
  }catch(e){
    bookmarks = {};
  }
  updateBookmarkCount();
}

async function saveBookmarks(){
  try{
    if (window.storage) await window.storage.set('geumma-bookmarks', JSON.stringify(bookmarks), false);
    else localStorage.setItem('geumma-bookmarks', JSON.stringify(bookmarks));
  }catch(e){ /* storage unavailable */ }
}

function updateBookmarkCount(){
  document.getElementById('bookmarkCount').textContent = Object.keys(bookmarks).length;
}

function toggleBookmark(id){
  const pool = usingMock ? ARTICLES : currentArticles;
  const a = pool.find(x => x.id === id) || bookmarks[id];
  if (!a) return;
  if (bookmarks[id]) delete bookmarks[id];
  else bookmarks[id] = a;
  saveBookmarks();
  updateBookmarkCount();
  renderResults();
}

function toggleBookmarkView(){
  showingBookmarks = !showingBookmarks;
  document.getElementById('bookmarkToggleBtn').classList.toggle('active', showingBookmarks);
  renderResults();
}

function toggleCountry(code){
  if (selectedCountries.has(code)) selectedCountries.delete(code);
  else selectedCountries.add(code);
  renderChips();
  renderResults();
}

function renderResults(){
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  if (showingBookmarks){
    const saved = Object.values(bookmarks);
    grid.innerHTML = '';
    if (saved.length === 0){
      grid.innerHTML = `<div class="loading">아직 즐겨찾기한 기사가 없어요. 기사 카드의 ☆를 눌러 저장해보세요.</div>`;
      return;
    }
    saved.forEach(a => grid.appendChild(buildCard(a)));
    return;
  }

  const pool = usingMock ? ARTICLES : currentArticles;
  const visible = pool.filter(a => selectedCountries.has(a.country));

  if (visible.length === 0 && emptyCountries.length === 0){
    grid.innerHTML = `<div class="loading">국가를 선택하고 검색해보세요.</div>`;
    return;
  }

  visible.forEach(a => grid.appendChild(buildCard(a)));

  // show a small notice for any selected country that came back with zero articles
  emptyCountries.filter(code => selectedCountries.has(code)).forEach(code => {
    const notice = document.createElement('div');
    notice.className = 'card';
    notice.innerHTML = `
      <div class="meta">${flagImg(code)}<span class="source">${COUNTRIES[code].name}</span></div>
      <div class="snippet">이 나라에서는 지난 1년간 관련 기사를 찾지 못했어요.</div>
    `;
    grid.appendChild(notice);
  });
}

function domainInitials(domain){
  return (domain || '').replace('www.','').split('.')[0].slice(0,3).toUpperCase();
}

function buildCard(a){
  const c = COUNTRIES[a.country];
  const el = document.createElement('div');
  el.className = 'card';
  const needsTranslate = a.lang !== 'ko';
  const saved = !!bookmarks[a.id];
  el.innerHTML = `
    <div class="meta">
      ${flagImg(a.country)}
      <span class="logo">${a.logo}</span>
      <span class="source">${a.source} · ${c.name}</span>
      <button class="bookmark-btn ${saved ? 'saved' : ''}" title="즐겨찾기" onclick="toggleBookmark('${a.id}')" style="margin-left:auto;">${saved ? '★' : '☆'}</button>
    </div>
    <div class="title">${a.title}</div>
    <div class="snippet">${a.snippet || '(요약문은 제공되지 않아요 — 아래 요약 버튼으로 제목 기반 추정 요약을 받아보세요)'}</div>
    <div class="ai-slot" id="ai-${a.id}"></div>
    <div class="actions">
      <button onclick="summarizeArticle('${a.id}')">요약</button>
      ${needsTranslate ? `<button onclick="translateArticle('${a.id}')">번역</button>` : ''}
      <button class="icon-only" title="원문 열기" onclick="window.open('${a.url || '#'}','_blank')">↗</button>
    </div>
  `;
  return el;
}

async function gdeltFetch(queryCore, useTimespan){
  const q = encodeURIComponent(queryCore);
  const sort = document.getElementById('sortSelect') ? document.getElementById('sortSelect').value : 'HybridRel';
  const timespanPart = useTimespan ? '&timespan=365days' : '';
  const url = `https://api.gdeltproject.org/api/v2/doc/doc?query=${q}&mode=artlist&maxrecords=6${timespanPart}&format=json&sort=${sort}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.articles || [];
}

async function fetchCountryArticles(topic, code){
  const queryCore = `${topic} sourcecountry:${gdeltSlug(code)}`;
  let list = await gdeltFetch(queryCore, true);
  // safety net: if the 1-year filter turns up nothing, retry without it
  // (covers cases where the timespan format isn't recognized, or the topic is just older)
  if (list.length === 0){
    list = await gdeltFetch(queryCore, false);
  }
  return list.map((art, i) => ({
    id: `${code}-${i}-${Date.now()}`,
    country: code,
    lang: code === 'KR' ? 'ko' : 'other',
    source: (art.domain || '').replace('www.',''),
    logo: domainInitials(art.domain),
    title: art.title || '(제목 없음)',
    snippet: '',
    url: art.url
  }));
}

let emptyCountries = []; // countries with zero results from the last search

async function runSearch(){
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return;
  showingBookmarks = false;
  document.getElementById('bookmarkToggleBtn').classList.remove('active');
  document.getElementById('tonePanel').style.display = 'block';
  const grid = document.getElementById('resultsGrid');
  const countryList = [...selectedCountries];
  grid.innerHTML = `<div class="loading">${countryList.map(c=>COUNTRIES[c].name).join(', ')} 언론 검색 중...</div>`;

  try{
    const results = await Promise.all(
      countryList.map(code => fetchCountryArticles(topic, code).catch(() => []))
    );
    currentArticles = results.flat();
    emptyCountries = countryList.filter((code, i) => results[i].length === 0);
    usingMock = false;
    renderResults();
  }catch(e){
    grid.innerHTML = `<div class="loading">뉴스를 가져오지 못했어요. 잠시 후 다시 시도해주세요.</div>`;
  }
}

// ---------- Claude API calls ----------
// Tries our own backend first (for the real deployed site, where the API key
// lives safely on the server). Falls back to calling api.anthropic.com directly,
// which only works when this file is opened as a Claude artifact preview.
async function callClaude(prompt){
  try{
    const res = await fetch('/api/claude', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ prompt })
    });
    if (res.ok){
      const data = await res.json();
      if (data.text) return data.text;
    }
  }catch(e){ /* no backend here — fall through */ }

  const res2 = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:800,
      messages:[{ role:'user', content: prompt }]
    })
  });
  const data2 = await res2.json();
  const text = (data2.content || []).map(b => b.text || '').join('\n').trim();
  return text || '응답을 가져오지 못했어요.';
}

async function summarizeArticle(id){
  const pool = usingMock ? ARTICLES : currentArticles;
  const a = pool.find(x => x.id === id) || bookmarks[id];
  const slot = document.getElementById('ai-' + id);
  if (summaryCache[id]) { slot.innerHTML = `<div class="ai-result">${summaryCache[id]}</div>`; return; }
  slot.innerHTML = `<div class="loading">원문 페이지 확인 중...</div>`;
  try{
    const excerpt = a.url ? await fetchArticleExcerpt(a.url) : null;
    let text;
    if (excerpt){
      const prompt = `다음은 ${COUNTRIES[a.country].name} 언론(${a.source}) 기사 웹페이지에서 가져온 본문 일부야. 광고나 메뉴 같은 관련 없는 텍스트가 섞여 있을 수 있으니 걸러내고, 기사 내용을 한국어로 세부적으로 요약해줘. 다음 구조로 정리해줘:\n- 핵심 내용 3~4문장\n- 배경/맥락 1~2문장\n- 주요 수치·인용·관계자 발언이 있다면 따로 짚어주기\n전체적으로 8~10문장 분량으로, 원문을 그대로 베끼지 말고 자연스럽게 풀어서 써줘.\n\n${excerpt}`;
      text = await callClaude(prompt);
    } else {
      const basis = a.snippet ? `제목: ${a.title}\n스니펫: ${a.snippet}` : `제목: ${a.title}\n(스니펫 없음 — 제목만으로 추정)`;
      const t = await callClaude(`다음은 ${COUNTRIES[a.country].name} 언론(${a.source})의 기사 정보야. 제목만으로 추정할 수 있는 맥락(어떤 주제인지, 어떤 입장/방향으로 보이는지)을 한국어로 3~4문장 정도 정리해줘. 실제 본문이 없으니 확정적으로 말하지 말고 "~로 보인다", "~를 다룬 기사로 추정된다"처럼 추정임을 분명히 해줘.\n${basis}`);
      text = `${t}\n\n(이 언론사 사이트가 외부 접근을 막아놔서 본문은 못 가져왔어요. 제목 기반 추정 요약이에요.)`;
    }
    summaryCache[id] = text;
    slot.innerHTML = `<div class="ai-result">${text}</div>`;
  }catch(e){
    slot.innerHTML = `<div class="ai-result">요약을 가져오지 못했어요. (이 버튼은 Claude 아티팩트 안에서 열었을 때 동작해요)</div>`;
  }
}

async function fetchArticleExcerpt(url){
  try{
    const res = await fetch(url);
    if (!res.ok) return null;
    const html = await res.text();
    const text = html
      .replace(/<script[\s\S]*?<\/script>/gi, ' ')
      .replace(/<style[\s\S]*?<\/style>/gi, ' ')
      .replace(/<[^>]+>/g, ' ')
      .replace(/&nbsp;|&amp;|&quot;|&#39;/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
    return text.length > 200 ? text.slice(0, 3500) : null;
  }catch(e){
    return null; // most news sites block cross-origin requests (CORS) — this is expected to fail often
  }
}

async function translateArticle(id){
  const pool = usingMock ? ARTICLES : currentArticles;
  const a = pool.find(x => x.id === id) || bookmarks[id];
  const slot = document.getElementById('ai-' + id);
  if (translateCache[id]) { slot.innerHTML = `<div class="ai-result">${translateCache[id]}</div>`; return; }
  slot.innerHTML = `<div class="loading">번역하는 중...</div>`;
  try{
    const basis = a.snippet ? `제목: ${a.title}\n스니펫: ${a.snippet}` : `제목: ${a.title}`;
    const prompt = `다음 뉴스 제목(및 있다면 스니펫)을 자연스러운 한국어로 번역해줘. 번역 결과만 출력해.\n${basis}`;
    const text = await callClaude(prompt);
    translateCache[id] = text;
    slot.innerHTML = `<div class="ai-result">${text}</div>`;
  }catch(e){
    slot.innerHTML = `<div class="ai-result">번역을 가져오지 못했어요. (이 버튼은 Claude 아티팩트 안에서 열었을 때 동작해요)</div>`;
  }
}

async function generateToneComparison(){
  const body = document.getElementById('toneBody');
  const pool = usingMock ? ARTICLES : currentArticles;
  const visible = pool.filter(a => selectedCountries.has(a.country));
  if (visible.length === 0){ body.textContent = '먼저 검색을 실행해주세요.'; return; }
  body.innerHTML = `<span class="loading">비교 생성 중...</span>`;
  const listing = visible.map(a => `[${COUNTRIES[a.country].name}/${a.source}] ${a.title}${a.snippet ? ' - ' + a.snippet : ''}`).join('\n');
  const prompt = `아래는 같은 주제에 대한 여러 나라 언론 기사 제목/요약 목록이야. 국가별로 논조가 어떻게 다른지 3~4문장으로 비교 요약해줘. 특정 정치적 입장을 옹호하지 말고 사실 위주로 중립적으로 정리해줘.\n\n${listing}`;
  try{
    const text = await callClaude(prompt);
    body.textContent = text;
  }catch(e){
    body.textContent = '비교를 가져오지 못했어요. (이 버튼은 Claude 아티팩트 안에서 열었을 때 동작해요)';
  }
}
